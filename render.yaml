services:
  - type: web
    name: dentcode
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://dentcode.onrender.com
    healthCheckPath: /api/health
